version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: radio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radio
      POSTGRES_PASSWORD: radio123
      POSTGRES_DB: radio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radio -d radio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: radio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: radio_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: radio
      POSTGRES_HOST: postgres
      POSTGRES_DB: radio_db
      POSTGRES_PASSWORD: radio123
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      JWT_SECRET: limbik_secret_key_2026
      CLIENT_URL: http://localhost:5173
      PORT: 5000
    volumes:
      - ./media:/app/media

  client:
    build: ./client
    container_name: radio_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data:
